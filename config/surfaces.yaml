# ASP Surface Registry
# SSOT for surface → repo/branch/team mapping within ASP project.

surfaces:
  backend:
    repo: AI-MYG/asp-backend
    base_branch: dev
    local_path: projects/asp/backend
    team_lead: marvin
    default_reviewers:
      - "369795172"
    tech_stack: [Python, FastAPI, PostgreSQL]
    deploy_target: CVM-1 Docker

  app:
    repo: AI-MYG/asp-app
    base_branch: main
    local_path: projects/asp/app
    team_lead: hujianfei
    default_reviewers:
      - "1401554949"
    tech_stack: [Flutter, Dart]
    deploy_target: App Store / APK

  admin:
    repo: AI-MYG/asp-admin
    base_branch: main
    # 相对路径（git root），跟随 ASP_WORKTREE_ROOT 解析，便于 Windows/mac 通用：
    #   Windows: .env 设 ASP_WORKTREE_ROOT=D:\work\asp  → D:\work\asp\asp-admin
    #   macOS:   .env 设 ASP_WORKTREE_ROOT=<你的工作区>  → <工作区>/asp-admin
    # Vue 前端在 nativesense-admin/ 子目录，agent 从此 git root 进入。
    local_path: asp-admin
    team_lead: hujianfei
    default_reviewers:
      - "1401554949"
    tech_stack: [Vue, JavaScript]
    deploy_target: CVM-1 Nginx

  wecom:
    repo: AI-MYG/asp-wecom
    base_branch: main
    local_path: projects/asp/wecom
    team_lead: marvin
    default_reviewers:
      - "369795172"
    tech_stack: [JavaScript, WeCom SDK]
    deploy_target: CVM-1

  websites:
    repo: AI-MYG/asp-websites
    base_branch: main
    local_path: projects/asp/websites
    team_lead: marvin
    default_reviewers:
      - "369795172"
    tech_stack: [HTML, CSS, JavaScript]
    deploy_target: COS + CVM

  canonical:
    repo: AI-MYG/asp-canonical
    base_branch: main
    local_path: projects/asp/canonical
    team_lead: marvin
    default_reviewers:
      - "369795172"
    tech_stack: [Markdown, YAML]
    deploy_target: none

# Branch naming convention
branch_pattern: "issue-{issue_number}/{surface}"
