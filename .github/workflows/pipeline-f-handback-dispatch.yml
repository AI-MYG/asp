# Pipeline F scheme 3: receive deploy completion dispatch and run handback + Feishu notify.
# Instance: AI-MYG/asp (local path projects/asp-infra)

name: Pipeline F Handback Dispatch

on:
  repository_dispatch:
    types: [feishu-inbound-handback]

jobs:
  handback:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install feishu-inbound engine
        env:
          FEISHU_INBOUND_GH_TOKEN: ${{ secrets.FEISHU_INBOUND_GH_TOKEN }}
          FEISHU_INBOUND_GH_PACKAGES_TOKEN: ${{ secrets.FEISHU_INBOUND_GH_PACKAGES_TOKEN }}
          FEISHU_INBOUND_INSTALL: package
        run: |
          if [ -z "${FEISHU_INBOUND_GH_TOKEN:-}" ]; then
            FEISHU_INBOUND_GH_TOKEN="${FEISHU_INBOUND_GH_PACKAGES_TOKEN:-}"
            export FEISHU_INBOUND_GH_TOKEN
          fi
          if [ -z "${FEISHU_INBOUND_GH_TOKEN:-}" ]; then
            echo "::error::Missing secret FEISHU_INBOUND_GH_TOKEN (PAT with repo read on 369795172/feishu-inbound-skill)"
            exit 1
          fi
          bash scripts/install_feishu_inbound_engine.sh

      - name: Run Pipeline F from CI/CD
        env:
          FEISHU_INBOUND_GH_TOKEN: ${{ secrets.FEISHU_INBOUND_GH_TOKEN }}
          FEISHU_INBOUND_GH_PACKAGES_TOKEN: ${{ secrets.FEISHU_INBOUND_GH_PACKAGES_TOKEN }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          TTS_BROADCAST_FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          TTS_BROADCAST_FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          REPO: ${{ github.event.client_payload.repo }}
          HEAD_SHA: ${{ github.event.client_payload.head_sha }}
          CICD_STAGE: ${{ github.event.client_payload.cicd_stage || github.event.client_payload.stage }}
        run: |
          set -euo pipefail
          PY="$PWD/venv/bin/python"
          if [ -n "${FEISHU_INBOUND_GH_TOKEN:-}" ]; then
            export GITHUB_TOKEN="$FEISHU_INBOUND_GH_TOKEN"
          elif [ -n "${FEISHU_INBOUND_GH_PACKAGES_TOKEN:-}" ]; then
            export GITHUB_TOKEN="$FEISHU_INBOUND_GH_PACKAGES_TOKEN"
          else
            echo "::error::Missing FEISHU_INBOUND_GH_TOKEN for cross-repo GitHub API access"
            exit 1
          fi
          export GH_TOKEN="$GITHUB_TOKEN"
          if [ -z "${REPO:-}" ] || [ -z "${HEAD_SHA:-}" ]; then
            echo "::error::Missing repo or head_sha in dispatch payload"
            exit 1
          fi
          ISSUE=$("$PY" - <<'PY'
          import os
          from feishu_inbound.handback.cicd import issues_for_head_sha
          nums = issues_for_head_sha(os.environ["REPO"], os.environ["HEAD_SHA"])
          print(nums[0] if nums else "")
          PY
          )
          if [ -z "${ISSUE:-}" ]; then
            echo "No issue number resolved from merge commit; skipping."
            exit 0
          fi
          "$PY" -m feishu_inbound.cli handback \
            --config tools/feishu_inbound/config.yaml \
            --from-cicd \
            --repo "$REPO" \
            --issue "$ISSUE" \
            --head-sha "$HEAD_SHA" \
            --cicd-stage "${CICD_STAGE:-dev}"
