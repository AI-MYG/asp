# Feishu Inbound Requirement Pipeline Configuration вҖ” AI-MYG/asp
# Pipeline A: feishu-inbound.yml вҖ” Bitable вҶ’ Issue (cloud)
# Pipeline B: triage_agent.py вҖ” routing + difficulty + triaged + assignee (central Mac)
# Pipeline C: issue_scanner.py вҖ” per-developer difficulty-aware analysis (local Mac)
# Pipeline D: issue_executor.py вҖ” worktree execution + Smart PR (local Mac)
#
# вҳ… ж”№ Pipeline C/D жү«жҸҸиҢғеӣҙпјҡеҸӘж”№дёӢж–№ pipeline_cd_scanпјҢеӢҝж”№ PythonгҖӮ

# --- Pipeline C/D: Issue scan scope (SSOT) ---
# mode:
#   org   вҖ” github.org дёӢжүҖжңү repo йҮҢжҢҮжҙҫз»ҷ assignee зҡ„ open issueпјҲеҪ“еүҚй»ҳи®Өпјү
#   repo  вҖ” д»…еҚ•дёӘ repo
#   repos вҖ” д»…еҲ—еҮәзҡ„еӨҡдёӘ repo
# assignee: GitHub з”ЁжҲ· IDпјӣиҝҗиЎҢж—¶д»Қд»ҘзҺҜеўғеҸҳйҮҸ GITHUB_ASSIGNEE дёәеҮҶпјҲжң¬жңәејҖеҸ‘иҖ…пјү
pipeline_cd_scan:
  mode: org
  github:
    org: AI-MYG
    limit: 100
    state: open
  # mode: repo ж—¶дҪҝз”Ё:
  # repo: AI-MYG/asp-backend
  # mode: repos ж—¶дҪҝз”Ё:
  # repos:
  #   - AI-MYG/asp-backend
  #   - AI-MYG/asp-admin
  exclude_repos: []
  # assignee: "369795172"   # еҸҜйҖүй»ҳи®Өпјӣжң¬жңәд»Ҙ Keychain GITHUB_ASSIGNEE дёәеҮҶ

# --- Engine instance (A-light hybrid вҖ” feishu-inbound-skill SSOT) ---
# Runtime artifacts (checkpoints + engine logs) live under instance var/, gitignored.
# Paths are relative to this config file вҖ” not process cwd.
secrets_prefix: ""
state_dir: ../../var/feishu_inbound/state
logs_dir: ../../var/feishu_inbound/logs
worktree_root: ../../../
worktree_root_env: ASP_WORKTREE_ROOT
worktree_dir: ../../worktrees
surfaces_config_path: ../../config/surfaces.yaml
instance_tools_path: ../..

env_loader:
  import_chain: []

prompts:
  domain_context: |
    ASP йЈһд№Ұе…Ҙз«ҷжөҒж°ҙзәҝгҖӮеҲҶжһҗ/жү§иЎҢеүҚйҳ…иҜ»еҜ№еә” surface worktree дёҺ AGENTS.mdгҖӮ

assignees:
  by_id:
    "369795172": "иўҒзү§"
    "1401554949": "иғЎеү‘йЈһ"
  by_name:
    "иўҒзү§": "369795172"
    "иғЎеү‘йЈһ": "1401554949"

central_issue:
  title_tag: '\[ASP-(\d+)\]'
  body_ref: 'AI-MYG/asp#(\d+)'

launchd_label_prefix: com.asp
launchd_labels:
  feishu_inbound_triage: com.asp.feishu-inbound-triage
  lead_tick: com.asp.feishu-inbound-lead-tick

advisor:
  enabled: false
  model: claude-opus-4-6
  import_chain:
    - tools.agent_clients.AgentClient

agent_client:
  import_chain:
    - tools.agent_client.AgentClient

surface_worktrees:
  backend: projects/asp/backend
  app: projects/asp/app
  admin: projects/asp/admin
  wecom: projects/asp/wecom
  websites: projects/asp/websites
  canonical: projects/asp/canonical

# --- Pipeline launchd и°ғеәҰпјҲSSOTпјҢж”№жӯӨеӨ„еҗҺ bash launchd/install.sh жҲ– feishu-inbound install-launchdпјү---
# hours: all = 0вҖ“23 зӮ№жҜҸеӨ©пјӣжҲ– "9-18" д»…е·ҘдҪңж—¶й—ҙ
# weekday_only: false = еҗ«е‘Ёжң«пјҲ24/7 дёҺ rootgrove calendar_interval_xml дёҖиҮҙпјү
# Lead Mac: triage (B) + lead_tick (CвҶ’DвҶ’EвҶ’F chain). Legacy per-stage launchd jobs removed 2026-06-19.
launchd_schedules:
  lead_tick:
    hours: all
    minutes: [20, 50]
    weekday_only: false
  feishu_inbound_triage:
    hours: all
    minutes: [10, 40]
    weekday_only: false

# --- Pipeline F: handback after dev CI/CD succeeds ---
# Scans review-dev-pass issues; when linked PR is merged and dev workflow succeeds,
# assigns issue author via handback_to_requester (no label; idempotent on assignee).
pipeline_f:
  scan:
    org: AI-MYG
    limit: 100
  dev_cicd:
    AI-MYG/asp-backend:
      workflow: "Backend Dev Test Container"
    AI-MYG/asp-admin:
      workflow: "рҹ”Қ Code Quality - Vue Admin"
    AI-MYG/asp-app:
      workflow: "рҹҡҖ CI/CD Multi-Device Pipeline - Flutter Kiosk App"

# --- Pipeline E: gate review (review only, never edits code / merges) ---
# PR body records D via "**Implemented by**: `opencode/glm-5.1`" вҶ’ E uses cursor_sdk/composer-2.5.
# Overrides: PIPELINE_E_REVIEW_EXECUTOR, PIPELINE_E_REVIEW_MODEL (env) > fields below.
# Feishu notify: open_id SSOT in feishu_notify below (app-scoped, not secret).
#   app_id/secret stay in Keychain (TTS_BROADCAST_* or IC_FEISHU_* per bot).
#   Env PIPELINE_E_FEISHU_OPEN_ID / PIPELINE_E_FEISHU_BOT can override config.
pipeline_e:
  review_executor: cursor_agent
  review_model: composer-2.5
  feishu_notify:
    bot: tts
    open_ids:
      tts: ou_6d0ef3a7cfa50efecff07794ce084aee
      ic: ou_40ce8162e8c5bd2d95d6570886eb6a65
  review_route_pool:
    - executor: cursor_agent
      model: composer-2.5
    - executor: cursor_sdk
      model: composer-2.5
    - executor: claude_code
      model: claude-sonnet-4
    - executor: opencode
      model: glm-5.1
  max_parallel: 3

central_triage:
  host_note: "Marvin MacBook вҖ” director machine (B :10/:40); lead tick CвҶ’F :20/:50"
  launchd_label: com.asp.feishu-inbound-triage

# --- GitHub Target ---
github:
