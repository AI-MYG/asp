# Feishu Inbound Requirement Pipeline Configuration — AI-MYG/asp
# Pipeline A: feishu-inbound.yml — Bitable → Issue (cloud)
# Pipeline B: triage_agent.py — routing + difficulty + triaged + assignee (central Mac)
# Pipeline C: issue_scanner.py — per-developer difficulty-aware analysis (local Mac)
# Pipeline D: issue_executor.py — worktree execution + Smart PR (local Mac)
#
# ★ 改 Pipeline C/D 扫描范围：只改下方 pipeline_cd_scan，勿改 Python。

# --- Pipeline C/D: Issue scan scope (SSOT) ---
# mode:
#   org   — github.org 下所有 repo 里指派给 assignee 的 open issue（当前默认）
#   repo  — 仅单个 repo
#   repos — 仅列出的多个 repo
# assignee: GitHub 用户 ID；运行时仍以环境变量 GITHUB_ASSIGNEE 为准（本机开发者）
pipeline_cd_scan:
  mode: org
  github:
    org: AI-MYG
    limit: 100
    state: open
  # mode: repo 时使用:
  # repo: AI-MYG/asp-backend
  # mode: repos 时使用:
  # repos:
  #   - AI-MYG/asp-backend
  #   - AI-MYG/asp-admin
  exclude_repos: []
  # assignee: "369795172"   # 可选默认；本机以 Keychain GITHUB_ASSIGNEE 为准

# --- Engine instance (A-light hybrid — feishu-inbound-skill SSOT) ---
# Runtime artifacts (checkpoints + engine logs) live under instance var/, gitignored.
# Paths are relative to this config file — not process cwd.
secrets_prefix: ""
state_dir: ../../var/feishu_inbound/state
logs_dir: ../../var/feishu_inbound/logs
worktree_root: ../../../
worktree_root_env: ASP_WORKTREE_ROOT
worktree_dir: ../../worktrees
surfaces_config_path: ../../config/surfaces.yaml
instance_tools_path: ../..

env_loader:
  import_chain: []

prompts:
  domain_context: |
    ASP 飞书入站流水线。分析/执行前阅读对应 surface worktree 与 AGENTS.md。

assignees:
  by_id:
    "369795172": "袁牧"
    "1401554949": "胡剑飞"
  by_name:
    "袁牧": "369795172"
    "胡剑飞": "1401554949"

central_issue:
  title_tag: '\[ASP-(\d+)\]'
  body_ref: 'AI-MYG/asp#(\d+)'

launchd_label_prefix: com.asp
launchd_labels:
  feishu_inbound_triage: com.asp.feishu-inbound-triage
  lead_tick: com.asp.feishu-inbound-lead-tick

advisor:
  enabled: false
  model: claude-opus-4-6
  import_chain:
    - tools.agent_clients.AgentClient

agent_client:
  import_chain:
    - tools.agent_client.AgentClient

surface_worktrees:
  backend: projects/asp/backend
  app: projects/asp/app
  admin: projects/asp/admin
  wecom: projects/asp/wecom
  websites: projects/asp/websites
  canonical: projects/asp/canonical

# --- Pipeline launchd 调度（SSOT，改此处后 bash launchd/install.sh 或 feishu-inbound install-launchd）---
# hours: all = 0–23 点每天；或 "9-18" 仅工作时间
# weekday_only: false = 含周末（24/7 与 rootgrove calendar_interval_xml 一致）
# Lead Mac: triage (B) + lead_tick (C→D→E→D'→E'→F chain). Legacy per-stage launchd jobs removed 2026-06-19.
launchd_schedules:
  lead_tick:
    hours: all
    minutes: [20, 50]
    weekday_only: false
  feishu_inbound_triage:
    hours: all
    minutes: [10, 40]
    weekday_only: false

lead_tick:
  revision_execute_after_review: true

# Pipeline D auto-retry limits (engine v0.1.20+)
pipeline_d:
  max_attempts: 3
  max_revision_rounds: 3

# --- Pipeline F: handback after dev/prod CI/CD + Feishu notify ---
# Scans review-dev-pass issues; when linked PR is merged and CI workflow succeeds,
# assigns GitHub 负责人, posts F marker comment, and Feishu-DMs the GitHub issue owner.
# Scheme 3: surface repos dispatch feishu-inbound-handback → asp-infra workflow (see templates/).
pipeline_f:
  prod_eligibility_label: dev-accepted
  promote:
    dispatch_event: feishu-inbound-promote
  scan:
    org: AI-MYG
    limit: 100
  feishu_notify:
    bot: tts
    webhook_env: CHATOPS_WEBHOOK_URL
    open_ids:
      tts: ou_6d0ef3a7cfa50efecff07794ce084aee
    by_github_id:
      "369795172": ou_6d0ef3a7cfa50efecff07794ce084aee
      "1401554949": ou_40ce8162e8c5bd2d95d6570886eb6a65
    requester_open_ids: {}
  env_urls:
    dev: "https://inputer-admin.aimyg.com"
    prod: "https://admin.aimyg.com"
  dev_cicd:
    AI-MYG/asp-backend:
      workflow: "Backend Dev Test Container"
      merge_base_branches: [dev]
    AI-MYG/asp-admin:
      workflow: "🔍 Code Quality - Vue Admin"
      merge_base_branches: [main]
    AI-MYG/asp-app:
      workflow: "🚀 CI/CD Multi-Device Pipeline - Flutter Kiosk App"
      merge_base_branches: [main]
  prod_cicd:
    AI-MYG/asp-backend:
      workflow: "Backend Container Release"
      merge_base_branches: [production]
    AI-MYG/asp-admin:
      workflow: "🚀 Manual Deploy"
      merge_base_branches: [main]
    AI-MYG/asp-app:
      workflow: "🚀 Manual Deploy"
      merge_base_branches: [main]

# --- Acceptance: dev business gate after F dev handback ---
acceptance:
  release_owner: "369795172"

# --- Pipeline E: gate review (review only, never edits code / merges) ---
# PR body records D via "**Implemented by**: `opencode/glm-5.2`" → E uses cursor_sdk/composer-2.5.
# Overrides: PIPELINE_E_REVIEW_EXECUTOR, PIPELINE_E_REVIEW_MODEL (env) > fields below.
# Feishu notify: open_id SSOT in feishu_notify below (app-scoped, not secret).
#   app_id/secret stay in Keychain (TTS_BROADCAST_* or IC_FEISHU_* per bot).
#   Env PIPELINE_E_FEISHU_OPEN_ID / PIPELINE_E_FEISHU_BOT can override config.
pipeline_e:
  review_executor: cursor_agent
  review_model: composer-2.5
  feishu_notify:
    bot: tts
    open_ids:
      tts: ou_6d0ef3a7cfa50efecff07794ce084aee
      ic: ou_40ce8162e8c5bd2d95d6570886eb6a65
  review_route_pool:
    - executor: cursor_agent
      model: composer-2.5
    - executor: cursor_sdk
      model: composer-2.5
    - executor: claude_code
      model: claude-sonnet-4
    - executor: opencode
      model: glm-5.2
  max_parallel: 3

central_triage:
  host_note: "Marvin MacBook — director machine (B :10/:40); lead tick C→D→E→D'→E'→F :20/:50"
  launchd_label: com.asp.feishu-inbound-triage

# --- GitHub Target ---
github:
  repo: "AI-MYG/asp"
  issue_title_prefix: "[feishu]"
  default_labels:
    - "feishu-inbound"
  processed_label: "triaged"

# --- Feishu Bitable Field Mapping (Inbound: Bitable → GitHub) ---
bitable_fields:
  title: "反馈问题"
  description: "用户故事"
  author: "需求负责人"
  priority: "优先级"
  requirement_type: "需求类型"
  feature_id: "Feature ID"
  writeback:
    issue_link: "GitHub Issue"
    status: "需求状态"
    status_value: "已派发"

# --- Surface Routing (Layer 2) ---
surface_routing:
  backend:
    keywords: ["后端", "API", "接口", "数据库", "服务端", "backend", "endpoint", "migration"]
    label: "backend"
  admin:
    keywords: ["管理端", "管理后台", "admin", "后台管理", "运营端"]
    label: "admin"
  app:
    keywords: ["APP", "Flutter", "移动端", "客户端", "app端", "安卓", "iOS", "儿童端", "播放", "投屏", "音频", "视频", "画面", "动画", "界面", "页面", "弹窗", "按钮", "点击", "滑动", "触摸"]
    label: "app"
  websites:
    keywords: ["官网", "landing", "website", "落地页", "静态页"]
    label: "websites"
  wecom:
    keywords: ["企微", "企业微信", "wecom", "侧边栏"]
    label: "wecom"

# --- Assignee Routing (Layer 2A) ---
# Maps surface → GitHub user ID for auto-assignment.
# Must stay in sync with config/surfaces.yaml default_reviewers.
assignee_routing:
  backend: "369795172"
  wecom: "369795172"
  websites: "369795172"
  app: "1401554949"
  admin: "1401554949"
  cross_surface_default: "369795172"

# --- Scope Estimation (Layer 2) ---
scope_heuristics:
  small:
    max_surfaces: 1
    keywords: ["修复", "fix", "调整", "补充", "小改"]
  medium:
    max_surfaces: 2
    keywords: ["新增", "优化", "重构", "feature"]
  large:
    min_surfaces: 3
    keywords: ["重构", "架构", "迁移", "全量"]

# --- Issue Body Template ---
issue_body_template: |
  ## Feishu Inbound Requirement

  **Source**: Feishu Bitable (record: `{record_id}`)
  **Feature ID**: `{feature_id}`
  **Author**: {author}
  **Priority**: {priority}
  **Type**: {requirement_type}

  ---

  {description}

  ---
  _Auto-created by feishu-inbound pipeline. Pending inbound agent analysis._
